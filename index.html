<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>How Crowdcode Works 🚀</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="hero">
            <h1>Welcome to <span class="highlight">Crowdcode</span> 🚀</h1>
            <p class="tagline">Many minds, one better code</p>
        </header>

        <div class="steps-grid">
            <div class="step-card">
                <div class="step-number">1</div>
                <h3>Share Ideas</h3>
                <p>The crowd brainstorms together</p>
            </div>

            <div class="step-card">
                <div class="step-number">2</div>
                <h3>Merge Solutions</h3>
                <p>Ideas combine into one direction</p>
            </div>

            <div class="step-card">
                <div class="step-number">3</div>
                <h3>Build Together</h3>
                <p>Everyone codes HTML, CSS, JS</p>
            </div>

            <div class="step-card">
                <div class="step-number">4</div>
                <h3>See Magic</h3>
                <p>Changes appear instantly</p>
            </div>
        </div>

        <div class="benefits">
            <div class="benefit">⚡<span>Fast</span></div>
            <div class="benefit">🧩<span>Together</span></div>
            <div class="benefit">🎓<span>Learn</span></div>
            <div class="benefit">🌈<span>Create</span></div>
        </div>

        <button class="cta-button" onclick="celebrate()">Let's Code Together! 🎉</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
