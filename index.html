<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal OS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="terminal">
        <div class="terminal-header">
            <div class="terminal-title">Terminal OS v1.0</div>
            <div class="terminal-info">Type 'help' for available commands</div>
        </div>
        
        <div id="output" class="terminal-output"></div>
        
        <div class="terminal-input-line">
            <span class="prompt">$</span>
            <input type="text" id="input" class="terminal-input" autocomplete="off" autofocus>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
